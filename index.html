<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>this is a title</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="review-container__section">
    <div class="review-container">

        <div class="title">Consumer review</div>

        <div class="description">
            This form is for submitting product reviews
        </div>

        <section class="review-container__inputs">

            <div class="review-container__inputs--section">
                <div class="firstName">
                    <div>FirstName: </div>
                    <label>
                        <input class="review-container__inputs--firstname" id="firstName">
                    </label>
                </div>

                <div class="lastName">
                    <div>LastName: </div>
                    <label>
                        <input class="review-container__inputs--lastname" id="lastName">
                    </label>
                </div>

                <div class="review">
                    <div>Customer Review</div>
                    <label>
                        <textarea class="review__text-area" id="review"></textarea>
                    </label>
                </div>
            </div>



            <div class="review-container__buttons">
                <button class="submit-button" onclick="getFirstName(); getLastName(); getTextAraInput()">Read</button>
                <button class="submit-button" onclick="sendRequest()">Submit</button>
                <button class="clear-button" onclick="clearData()">Clear</button>
            </div>
        </section>
    </div>
</div>
<script src="myFirstScript.js"></script>

</body>
